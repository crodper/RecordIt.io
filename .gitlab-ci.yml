# CI/CD de recordIt.
#
# - test:   corre la suite en cada push/MR.
# - build:  en cada tag, construye el AppImage portable (reproduce el build local:
#           PyInstaller dentro de Debian bullseye = glibc 2.31, igual que
#           Dockerfile.linux) y lo sube al Package Registry genérico del proyecto.
# - release: en cada tag, crea la Release de GitLab enlazando el AppImage.
#
# Lanzar una release:  git tag v1.0.0 && git push origin v1.0.0
#
# El AppImage NO empaqueta el modelo Whisper (~3 GB): se descarga en la 1ª
# transcripción. El .exe de Windows no se genera aquí (ver docs/BUILD-WINDOWS.md).

# Sin bloque workflow: cada job decide con sus `rules` (estilo del resto de
# proyectos). Una **release** (push de un tag) genera UNA sola pipeline con las
# 3 etapas: test -> build -> release. Las MR solo corren `test`. Los push a rama
# no generan pipeline (no hay job que aplique).
stages:
  - test
  - build
  - release

variables:
  IMAGEN_BUILD: "python:3.12-bullseye"   # glibc 2.31: binario portable (Linux)
  # Imagen Windows para el .exe (executor docker-windows del runner #183).
  # Debe COINCIDIR con la versión de Windows del host: ltsc2022 (Win11/Server2022)
  # o ltsc2019 (Win10 1809/Server2019). Si el contenedor no arranca, cambia esto.
  IMAGEN_WIN: "python:3.12-windowsservercore-ltsc2022"
  APPIMAGE: "recordIt-x86_64.AppImage"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# ----------------------------------------------------------------------------
test:
  stage: test
  image: "$IMAGEN_BUILD"
  cache:
    key:
      files: [requirements.txt]
    paths: [.cache/pip]
  rules:
    - if: '$CI_COMMIT_TAG'                                   # 1ª etapa de la release
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'     # validación en MR
    - when: never
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends libportaudio2 && rm -rf /var/lib/apt/lists/*
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pytest -q

# ----------------------------------------------------------------------------
build-appimage:
  stage: build
  image: "$IMAGEN_BUILD"
  rules:
    - if: '$CI_COMMIT_TAG'
  cache:
    key:
      files: [requirements.txt]
    paths: [.cache/pip]
  before_script:
    # Mismas dependencias del sistema que Dockerfile.linux + utilidades del AppImage.
    - apt-get update && apt-get install -y --no-install-recommends
        libportaudio2 tk file desktop-file-utils curl xz-utils ca-certificates
    - rm -rf /var/lib/apt/lists/*
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    # 1) ffmpeg estático (igual que en local).
    - mkdir -p vendor
    - curl -fsSL -o /tmp/ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
    - tar xf /tmp/ffmpeg.tar.xz -C /tmp
    - cp /tmp/ffmpeg-*-static/ffmpeg vendor/ffmpeg
    - chmod +x vendor/ffmpeg
    # 2) Binario portable con PyInstaller (mismo recordit.spec).
    - pyinstaller --noconfirm --clean --distpath dist-portable --workpath /tmp/wb recordit.spec
    # 3) Empaquetar AppImage (mismo make-appimage.sh; sin FUSE en CI).
    - export APPIMAGE_EXTRACT_AND_RUN=1
    - bash make-appimage.sh
    # 4) Subir al Package Registry genérico del proyecto.
    - |
      curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --upload-file "$APPIMAGE" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/recordit/${CI_COMMIT_TAG}/${APPIMAGE}"
  # El AppImage (~177 MB) no se guarda como artefacto (límite del runner): la
  # entrega es el Package Registry + la Release.

# ----------------------------------------------------------------------------
# Build del .exe en el runner Windows (#183, tag docker-windows = contenedores).
# Corre en un contenedor Windows con Python 3.12 (IMAGEN_WIN). Instala el VC++
# runtime (lo necesita ctranslate2) y compila con PyInstaller.
#
# PRERREQUISITOS en el runner Windows (config del runner, NO de este YAML):
#   * shell = "powershell" en config.toml: la imagen trae Windows PowerShell
#     (powershell.exe), no pwsh; el runner por defecto usa pwsh y fallaría con
#     "CreateProcess: pwsh ... cannot find the file". Reiniciar el runner tras editarlo.
#   * La etiqueta de la imagen (ltsc2022) DEBE coincidir con la versión de Windows
#     del host (contenedores Windows solo corren la misma versión que el host):
#     Server 2019/Win10 1809 -> usar ltsc2019. Override con la variable IMAGEN_WIN.
#   * Pre-descargar la imagen una vez en el host (es multi-GB; evita el deadline de
#     pull en CI):  docker pull python:3.12-windowsservercore-ltsc2022
#     y permitir if-not-present en config.toml:
#       [runners.docker]
#         allowed_pull_policies = ["always", "if-not-present"]
build-exe:
  stage: build
  tags:
    - docker-windows
  image:
    name: "$IMAGEN_WIN"
    pull_policy: if-not-present
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    # Comillas simples: las líneas PowerShell con { } o " " son cadenas para YAML.
    - 'python --version'
    # VC++ runtime x64 (msvcp140/vcruntime140) que requiere ctranslate2.
    - 'Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "$env:TEMP\vc_redist.x64.exe"'
    - 'Start-Process -Wait -FilePath "$env:TEMP\vc_redist.x64.exe" -ArgumentList "/install","/quiet","/norestart"'
    - 'python -m pip install --upgrade pip'
    - 'python -m pip install -r requirements.txt'
    - 'python -c "import tkinter, customtkinter, PIL, sounddevice, ctranslate2; print(''deps OK'')"'
    # ffmpeg.exe estático -> vendor\ffmpeg.exe
    - 'New-Item -ItemType Directory -Force vendor | Out-Null'
    - 'Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "$env:TEMP\ffmpeg.zip"'
    - 'Expand-Archive -Force "$env:TEMP\ffmpeg.zip" "$env:TEMP\ffmpeg"'
    - 'Copy-Item (Get-ChildItem "$env:TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1).FullName "vendor\ffmpeg.exe"'
    # Compilar y subir el .exe al Package Registry.
    - 'python -m PyInstaller --noconfirm --clean recordit.spec'
    - 'curl.exe --fail --header "JOB-TOKEN: $env:CI_JOB_TOKEN" --upload-file "dist\recordIt.exe" "$env:CI_API_V4_URL/projects/$env:CI_PROJECT_ID/packages/generic/recordit/$env:CI_COMMIT_TAG/recordIt.exe"'

# ----------------------------------------------------------------------------
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_COMMIT_TAG'
  needs:
    - build-appimage
    - build-exe
  script:
    - echo "Creando release $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "recordIt $CI_COMMIT_TAG"
    description: |
      recordIt $CI_COMMIT_TAG — grabar, transcribir y generar actas de reunión.

      **Descargas:**
      - `recordIt-x86_64.AppImage` — Linux x86-64 (portable): `chmod +x` y ejecutar.
      - `recordIt.exe` — Windows x86-64.

      La 1ª transcripción descarga el modelo Whisper large-v3 (~3 GB).
    assets:
      links:
        - name: "$APPIMAGE"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/recordit/${CI_COMMIT_TAG}/${APPIMAGE}"
          link_type: package
        - name: "recordIt.exe"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/recordit/${CI_COMMIT_TAG}/recordIt.exe"
          link_type: package
